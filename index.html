<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>英単語反復テストツール</title>
<style>
  body { font-family: sans-serif; max-width: 600px; margin: 0 auto; padding: 70px 20px 20px; text-align: center; }
  #menu-bar { position: fixed; top: 0; left: 0; width: 100%; background-color: #2c3e50; padding: 10px 0; z-index: 1000; text-align: center; }
  #menu-bar button { padding: 8px 16px; font-size: 14px; cursor: pointer; background-color: #ecf0f1; border: none; border-radius: 3px; }
  #menu-bar button:hover { background-color: #bdc3c7; }
  
  input[type="text"], textarea { width: 100%; margin-bottom: 10px; padding: 8px; box-sizing: border-box; }
  textarea { height: 120px; }
  .action-button { padding: 10px 20px; font-size: 16px; margin: 5px; cursor: pointer; }
  .danger-button { padding: 5px 10px; font-size: 12px; cursor: pointer; background-color: #e74c3c; color: white; border: none; border-radius: 3px; margin-top: 10px; }
  
  .choice-btn { display: block; width: 100%; margin: 10px 0; padding: 15px; font-size: 18px; text-align: left; background-color: #f0f8ff; border: 1px solid #b0c4de; border-radius: 5px; cursor: pointer; }
  .choice-btn:hover { background-color: #e6e6fa; }
  
  #quiz-area, #summary-area, #setup-area { display: none; margin-top: 20px; }
  #dashboard-area { display: block; margin-top: 20px; text-align: left; }
  
  .test-card { border: 1px solid #ccc; border-radius: 5px; padding: 15px; margin-bottom: 15px; background-color: #f9f9f9; }
  .test-card h3 { margin-top: 0; color: #2c3e50; }
  .test-card p { margin: 5px 0; color: #555; }
  
  #question-word { font-size: 32px; margin-bottom: 20px; font-weight: bold; }
  #status { margin-bottom: 20px; color: #555; }
  #result-message { font-size: 20px; color: #d2691e; margin-top: 20px; }
  
  table { width: 100%; border-collapse: collapse; margin: 20px 0; text-align: left; }
  th, td { border: 1px solid #ccc; padding: 10px; }
  th { background-color: #f2f2f2; }
  
  #share-link-input { width: 100%; padding: 10px; margin-top: 10px; font-size: 14px; display: none; }
  
  hr { border: 0; height: 1px; background: #ccc; margin: 30px 0; }
</style>
</head>
<body>

<div id="menu-bar">
  <button onclick="goToDashboard()">ホームに戻る (テスト一覧)</button>
</div>

<h1>英単語反復テスト</h1>

<div id="dashboard-area">
  <h2>進行中のテスト</h2>
  <div id="test-list-container"></div>
  
  <hr>
  
  <div id="new-test-section" style="text-align: center;">
    <h2>新しいテストを作成</h2>
    <button class="action-button" onclick="showSetupArea()">新規作成画面へ</button>
  </div>
</div>

<div id="setup-area">
  <h2>新しいテストの作成</h2>
  <p>テストの名前（任意）</p>
  <input type="text" id="test-title-input" placeholder="例：第1課の単語、TOEIC対策など">
  
  <p>エクセルから「番号」「英単語」「日本語訳」の3列をコピーして貼り付けてください。</p>
  <textarea id="data-input">
1	society	社会
2	philosophy	哲学
3	economics	経済学
4	anthropology	人類学
5	community	共同体
6	culture	文化</textarea>
  <br>
  <button class="action-button" onclick="startNewTest()">この内容でテストを開始する</button>
  <br><br>
  <button onclick="generateShareLink()">この単語リストの共有リンクを作成</button>
  <input type="text" id="share-link-input" readonly onclick="this.select()">
</div>

<div id="quiz-area">
  <h2 id="current-test-title"></h2>
  <div id="status"></div>
  <div id="question-word"></div>
  <div id="choices-container"></div>
  <div id="result-message"></div>
</div>

<div id="summary-area">
  <h2>第 <span id="summary-round"></span> 周目の結果</h2>
  <p>以下の単語を間違えました。確認してから再テストに進みましょう。</p>
  <table id="mistake-table">
    <thead>
      <tr>
        <th>英単語</th>
        <th>日本語訳</th>
      </tr>
    </thead>
    <tbody id="mistake-table-body">
    </tbody>
  </table>
  <button class="action-button" onclick="startNextRound()">間違えた単語で再テストを開始</button>
</div>

<script>
  let allWords = [];
  let currentQuizList = [];
  let mistakeList = [];
  let currentIndex = 0;
  let roundCount = 1;
  let currentTestId = null;
  let currentTestTitle = "";
  
  const STORAGE_KEY = 'vocab_tests_multi_data';

  window.onload = function() {
    const urlParams = new URLSearchParams(window.location.search);
    const shareData = urlParams.get('data');

    if (shareData) {
      try {
        const decodedText = decodeURIComponent(escape(atob(shareData)));
        document.getElementById('data-input').value = decodedText;
        window.history.replaceState({}, document.title, window.location.pathname);
        showSetupArea();
        alert('共有された単語データを読み込みました。テストの名前を入力して開始してください。');
        return;
      } catch (e) {
        alert('共有リンクの読み込みに失敗しました。');
      }
    }

    renderDashboard();
  };

  function loadAllTests() {
    const data = localStorage.getItem(STORAGE_KEY);
    return data ? JSON.parse(data) : [];
  }

  function saveAllTests(testsArray) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(testsArray));
  }

  function saveCurrentProgress() {
    if (!currentTestId) return;
    
    let tests = loadAllTests();
    let testIndex = tests.findIndex(t => t.id === currentTestId);
    
    const testState = {
      id: currentTestId,
      title: currentTestTitle,
      allWords: allWords,
      currentQuizList: currentQuizList,
      mistakeList: mistakeList,
      currentIndex: currentIndex,
      roundCount: roundCount,
      lastUpdated: new Date().getTime()
    };

    if (testIndex >= 0) {
      tests[testIndex] = testState;
    } else {
      tests.push(testState);
    }
    
    saveAllTests(tests);
  }

  function deleteTest(id) {
    if (confirm('このテストのデータを削除してもよろしいですか？')) {
      let tests = loadAllTests();
      tests = tests.filter(t => t.id !== id);
      saveAllTests(tests);
      renderDashboard();
    }
  }

  function renderDashboard() {
    document.getElementById('setup-area').style.display = 'none';
    document.getElementById('quiz-area').style.display = 'none';
    document.getElementById('summary-area').style.display = 'none';
    document.getElementById('dashboard-area').style.display = 'block';

    const container = document.getElementById('test-list-container');
    container.innerHTML = '';
    const tests = loadAllTests();

    if (tests.length === 0) {
      container.innerHTML = '<p>進行中のテストはありません。</p>';
      return;
    }

    tests.sort((a, b) => b.lastUpdated - a.lastUpdated);

    for (let i = 0; i < tests.length; i++) {
      const t = tests[i];
      const card = document.createElement('div');
      card.className = 'test-card';
      
      const titleStr = t.title || '無題のテスト';
      const progressStr = `第 ${t.roundCount} 周目 : ${t.currentIndex} / ${t.currentQuizList.length} 問 完了`;
      
      card.innerHTML = `
        <h3>${titleStr}</h3>
        <p>全単語数: ${t.allWords.length}語</p>
        <p>現在の進捗: ${progressStr}</p>
        <button class="action-button" onclick="resumeTest('${t.id}')">続きから再開する</button>
        <button class="danger-button" onclick="deleteTest('${t.id}')">削除する</button>
      `;
      container.appendChild(card);
    }
  }

  function showSetupArea() {
    document.getElementById('dashboard-area').style.display = 'none';
    document.getElementById('setup-area').style.display = 'block';
  }

  function goToDashboard() {
    currentTestId = null;
    renderDashboard();
  }

  function resumeTest(id) {
    const tests = loadAllTests();
    const testData = tests.find(t => t.id === id);
    
    if (testData) {
      currentTestId = testData.id;
      currentTestTitle = testData.title;
      allWords = testData.allWords;
      currentQuizList = testData.currentQuizList;
      mistakeList = testData.mistakeList;
      currentIndex = testData.currentIndex;
      roundCount = testData.roundCount;
      
      document.getElementById('dashboard-area').style.display = 'none';
      document.getElementById('quiz-area').style.display = 'block';
      document.getElementById('current-test-title').innerText = currentTestTitle;
      
      showQuestion();
    }
  }

  function startNewTest() {
    const inputText = document.getElementById('data-input').value.trim();
    if (!inputText) {
      alert('データを入力してください。');
      return;
    }

    allWords = [];
    const lines = inputText.split('\n');
    for (let i = 0; i < lines.length; i++) {
      const parts = lines[i].split('\t');
      if (parts.length >= 3) {
        allWords.push({
          id: parts[0].trim(),
          en: parts[1].trim(),
          ja: parts[2].trim()
        });
      }
    }

    if (allWords.length < 4) {
      alert('4択を作るため、最低でも4つ以上の単語データを入力してください。');
      return;
    }

    let inputTitle = document.getElementById('test-title-input').value.trim();
    if (!inputTitle) {
      inputTitle = allWords[0].en + ' などのテスト';
    }

    currentTestId = 'test_' + new Date().getTime();
    currentTestTitle = inputTitle;
    roundCount = 1;
    
    document.getElementById('setup-area').style.display = 'none';
    document.getElementById('quiz-area').style.display = 'block';
    document.getElementById('current-test-title').innerText = currentTestTitle;
    
    startRound(allWords);
  }

  function startRound(listToTest) {
    currentQuizList = [...listToTest];
    shuffleArray(currentQuizList);
    mistakeList = [];
    currentIndex = 0;
    
    saveCurrentProgress();
    
    document.getElementById('result-message').innerText = '';
    document.getElementById('summary-area').style.display = 'none';
    document.getElementById('quiz-area').style.display = 'block';
    
    showQuestion();
  }

  function showQuestion() {
    if (currentIndex >= currentQuizList.length) {
      endRound();
      return;
    }

    const currentWord = currentQuizList[currentIndex];
    document.getElementById('status').innerText = `第 ${roundCount} 周目 : ${currentIndex + 1} / ${currentQuizList.length} 問`;
    document.getElementById('question-word').innerText = currentWord.en;

    const choicesContainer = document.getElementById('choices-container');
    choicesContainer.innerHTML = '';

    const choices = generateChoices(currentWord);

    for (let i = 0; i < choices.length; i++) {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.innerText = choices[i].ja;
      btn.onclick = function() { checkAnswer(choices[i].ja, currentWord.ja, currentWord); };
      choicesContainer.appendChild(btn);
    }
  }

  function generateChoices(correctWord) {
    const choices = [correctWord];
    const otherWords = allWords.filter(word => word.en !== correctWord.en);
    shuffleArray(otherWords);

    for (let i = 0; i < 3; i++) {
      if (otherWords[i]) {
        choices.push(otherWords[i]);
      }
    }
    
    shuffleArray(choices);
    return choices;
  }

  function checkAnswer(selectedJa, correctJa, currentWord) {
    if (selectedJa !== correctJa) {
      mistakeList.push(currentWord);
      alert(`不正解です。\n正解は「${correctJa}」です。`);
    }

    currentIndex++;
    saveCurrentProgress();
    showQuestion();
  }

  function endRound() {
    if (mistakeList.length === 0) {
      let tests = loadAllTests();
      tests = tests.filter(t => t.id !== currentTestId);
      saveAllTests(tests);
      
      document.getElementById('status').innerText = '';
      document.getElementById('question-word').innerText = '全問正解クリア！';
      document.getElementById('choices-container').innerHTML = '';
      document.getElementById('result-message').innerText = 'お疲れ様でした。すべての単語を覚えました。';
      
      const backBtn = document.createElement('button');
      backBtn.className = 'action-button';
      backBtn.innerText = '一覧画面に戻る';
      backBtn.onclick = function() { goToDashboard(); };
      document.getElementById('quiz-area').appendChild(backBtn);
      
      currentTestId = null;
    } else {
      showMistakeSummary();
    }
  }

  function showMistakeSummary() {
    document.getElementById('quiz-area').style.display = 'none';
    document.getElementById('summary-area').style.display = 'block';
    document.getElementById('summary-round').innerText = roundCount;
    
    const tbody = document.getElementById('mistake-table-body');
    tbody.innerHTML = '';
    
    for (let i = 0; i < mistakeList.length; i++) {
      const tr = document.createElement('tr');
      const tdEn = document.createElement('td');
      tdEn.innerText = mistakeList[i].en;
      const tdJa = document.createElement('td');
      tdJa.innerText = mistakeList[i].ja;
      tr.appendChild(tdEn);
      tr.appendChild(tdJa);
      tbody.appendChild(tr);
    }
  }

  function startNextRound() {
    roundCount++;
    startRound(mistakeList);
  }

  function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      const temp = array[i];
      array[i] = array[j];
      array[j] = temp;
    }
  }

  function generateShareLink() {
    const inputText = document.getElementById('data-input').value.trim();
    if (!inputText) {
      alert('データが入力されていません。');
      return;
    }
    const encodedData = btoa(unescape(encodeURIComponent(inputText)));
    const currentUrl = window.location.href.split('?')[0];
    const shareUrl = currentUrl + '?data=' + encodedData;
    
    const inputElement = document.getElementById('share-link-input');
    inputElement.value = shareUrl;
    inputElement.style.display = 'block';
    inputElement.select();
    
    alert('共有用のリンクを作成しました。枠内のURLをコピーして相手に送ることができます。');
  }
</script>

</body>
</html>
